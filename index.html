<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  /* ── WIDGET SHELL ─────────────────────────────── */
  .widget {
    width: 380px;
    min-height: 540px;
    background: rgb(255, 230, 155);
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── RESTART BTN ──────────────────────────────── */
  .btn-restart {
    position: absolute;
    bottom: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(0,0,0,.08);
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background .15s, transform .2s;
    color: rgb(0, 0, 0);
  }

  .btn-restart:hover {
    background: rgba(0,0,0,.16);
    color: rgba(0,0,0,.8);
    transform: rotate(45deg);
  }

  .btn-restart svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* ── HEADER ───────────────────────────────────── */
  .widget-header {
    background: rgb(255, 204, 51);
    padding: 20px 24px 18px;
    color: #000000;
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .widget-header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .2px;
  }

  .widget-header p {
    font-size: 12.5px;
    opacity: .72;
  }

  /* ── BODY ─────────────────────────────────────── */
  .widget-body {
    flex: 1;
    padding: 24px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  /* ── START SCREEN ─────────────────────────────── */
  .start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    flex: 1;
    justify-content: center;
  }

  .start-screen h2 {
    font-size: 18px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 10px;
    line-height: 1.35;
  }

  .start-screen p {
    font-size: 13.5px;
    color: #000000;
    margin-bottom: 28px;
    line-height: 1.65;
    max-width: 270px;
  }

  .btn-start {
    background: rgb(255, 204, 51);
    color: #000000;
    border: none;
    border-radius: 13px;
    padding: 14px 44px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all .18s;
    
    letter-spacing: .2px;
  }

  .btn-start:hover  { 
    transform: translateY(-2px); 
  
    background: #eff6ff;
    color: #1e40af;
  }

  
    
    
    
  
  .btn-start:active { transform: translateY(0); }

  /* ── QUESTION SCREEN ──────────────────────────── */
  .question-text {
    font-size: 15.5px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .option-btn {
    background: rgb(255, 204, 51);
    border: 0px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px 16px;
    text-align: left;
    font-size: 13.5px;
    color: #000000;
    cursor: pointer;
    transition: all .14s ease;
    font-family: inherit;
    line-height: 1.45;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

  .option-dot {
    width: 8px;
    height: 8px;
    border: 2px solid #000000;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all .14s;
  }

  .option-btn:hover {
    background: #eff6ff;
    border-color: #2563eb;
    color: #1e40af;
    transform: translateX(3px);
  }

  .option-btn:hover .option-dot {
    border-color: #2563eb;
    background: #2563eb;
  }

  .option-btn:active { transform: translateX(1px); background: #dbeafe; }

  /* ── INPUT ────────────────────────────────────── */
  .input-label {
    font-size: 11.5px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 8px;
  }

  .input-field {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    color: #0f172a;
    margin-bottom: 12px;
    background: #f8fafc;
    transition: border-color .15s, box-shadow .15s;
    -moz-appearance: textfield;
  }

  .input-field::-webkit-inner-spin-button,
  .input-field::-webkit-outer-spin-button { -webkit-appearance: none; }

  .input-field:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    background: #fff;
  }

  .btn-next {
    background:  rgb(255, 204, 51);
    color: #000000;
    border: none;
    border-radius: 12px;
    padding: 13px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    transition: all .15s;
  }

  .btn-next:hover { opacity: .9; transform: translateY(-1px); }

  /* ── RESULT ───────────────────────────────────── */
  .result-box {
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 18px;
    flex: 1;
  }

  .result-box, .result-box * {
    font-size: 14px;
    color: #1e293b;
    line-height: 1.75;
  }

  .result-box a {
    color: #2563eb;
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1px solid rgba(37,99,235,.3);
    transition: border-color .15s;
  }

  .result-box a:hover { border-color: #2563eb; }

  .btn-reset {
    background:  rgb(255, 204, 51);
    color: #000000;
    border: none;
    border-radius: 12px;
    padding: 13px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    transition: all .15s;
    letter-spacing: .2px;
  }

  .btn-reset:hover { background: #ffffff; transform: translateY(-1px); }

  /* ── NAV BACK ─────────────────────────────────── */
  .nav-footer {
    display: flex;
    align-items: center;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #f1f5f9;
  }

  .btn-back {
    background: none;
    border: none;
    color: #000000;
    font-size: 13px;
    cursor: pointer;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    font-weight: 500;
    transition: color .14s;
  }

  .btn-back:hover { color: #2563eb; }

  /* ── ANIMATION ────────────────────────────────── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(7px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .animate-in { animation: fadeSlideIn .22s ease forwards; }
</style>

// ── LOGIKA ───────────────────────────────────────────────────────────────────
let historyStack = [];

function el(tag, props, ...children) {
  const node = document.createElement(tag);
  if (props) Object.assign(node, props);
  children.forEach(c => {
    if (typeof c === 'string') node.insertAdjacentHTML('beforeend', c);
    else if (c) node.appendChild(c);
  });
  return node;
}

function setBody(content) {
  const app = document.getElementById('app');
  app.innerHTML = '';
  content.classList.add('animate-in');
  app.appendChild(content);
}

function setRestartVisible(visible) {
  const btn = document.getElementById('restartBtn');
  if (btn) btn.style.display = visible ? 'flex' : 'none';
}

// START -----------------------------------------------------------------------
function showStart() {
  historyStack = [];
  setRestartVisible(false);

  const wrap = el('div', { className: 'start-screen' });

  wrap.appendChild(el('h2', {}, 'Nie wiesz, jaki wybrać wniosek?'));
  wrap.appendChild(el('p', {}, 'Odpowiedz na pytania, podpowiemy, który formularz należy złożyć.'));

  const btn = el('button', { className: 'btn-start' }, 'Sprawdź →');
  btn.onclick = () => render('Q2001');
  wrap.appendChild(btn);

  setBody(wrap);
}

// QUESTION --------------------------------------------------------------------
function render(id) {
  const q = data[id];
  if (!q) return;

  setRestartVisible(true);
  if (historyStack[historyStack.length - 1] !== id) historyStack.push(id);

  const wrap = el('div', {});

  wrap.appendChild(el('p', { className: 'question-text' }, q.text));

  if (q.options) {
    const list = el('div', { className: 'options-list' });
    q.options.forEach(opt => {
      const btn = el('button', { className: 'option-btn' });
      btn.appendChild(el('span', { className: 'option-dot' }));
      btn.appendChild(el('span', {}, opt.label));
      btn.onclick = () => {
        if (opt.next)   render(opt.next);
        if (opt.result) showResult(opt.result);
      };
      list.appendChild(btn);
    });
    wrap.appendChild(list);
  }

  if (q.input) {
    wrap.appendChild(el('p', { className: 'input-label' }, 'Podaj wartość'));
    const field = el('input', {
      type: 'text',
      inputMode: 'numeric',
      pattern: '[0-9]*',
      className: 'input-field',
      placeholder: q.placeholder || ''
    });
    const next = el('button', { className: 'btn-next' }, 'Dalej →');
    next.onclick = () => render(q.next);
    wrap.appendChild(field);
    wrap.appendChild(next);
  }

  // back button
  if (historyStack.length > 1) {
    const nav = el('div', { className: 'nav-footer' });
    const back = el('button', { className: 'btn-back' }, '← Wróć');
    back.onclick = () => {
      historyStack.pop();
      render(historyStack.pop());
    };
    nav.appendChild(back);
    wrap.appendChild(nav);
  }

  setBody(wrap);
}

// RESULT ----------------------------------------------------------------------
function showResult(key) {
  const text = RESULTS[key];
  if (!text) return;

  setRestartVisible(true);

  const wrap = el('div', { style: 'display:flex;flex-direction:column;flex:1' });

  const box = el('div', { className: 'result-box' });
  box.innerHTML = text;
  wrap.appendChild(box);

  const reset = el('button', { className: 'btn-reset' }, 'Zacznij od nowa');
  reset.onclick = showStart;
  wrap.appendChild(reset);

  setBody(wrap);
}

// ── START ─────────────────────────────────────────────────────────────────────
document.getElementById('restartBtn').onclick = showStart;
showStart();
</script>
